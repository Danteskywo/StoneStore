<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title data-i18n="Отписка от рассылки">Отписка от рассылки</title>
    <style>
        body {
            font-family: 'Montserrat', Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 500px;
            text-align: center;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 20px;
        }
        p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .button {
            display: inline-block;
            padding: 12px 30px;
            background: #2c3e50;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s ease;
        }
        .button:hover {
            background: #34495e;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 data-i18n="✅ Вы отписались от рассылки">✅ Вы отписались от рассылки</h1>
        <p data-i18n="Мы удалили ваш email из списка рассылки. Вы больше не будете получать наши письма.">Мы удалили ваш email из списка рассылки. Вы больше не будете получать наши письма.</p>
        <p data-i18n="Если вы передумаете, всегда можете подписаться снова на нашем сайте.">Если вы передумаете, всегда можете подписаться снова на нашем сайте.</p>
        <a href="https://stonestore.ru" class="button" data-i18n="На главную">На главную</a>
    </div>
</body>
</html>
