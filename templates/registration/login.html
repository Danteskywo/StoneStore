{% extends "base.html" %}
{% load static %}

{% block title %}Вход - StoneStore{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-container">
        <div class="auth-header">
            <h1 data-i18n="🔐 Вход в личный кабинет">🔐 Вход в личный кабинет</h1>
            <p data-i18n="Войдите, чтобы сохранять расчеты и отслеживать заказы">Войдите, чтобы сохранять расчеты и отслеживать заказы</p>
        </div>
        
        <form method="post" class="auth-form">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="username" data-i18n="Имя пользователя или Email">Имя пользователя или Email</label>
                <input type="text" name="username" id="username" required 
                       class="form-control" data-i18n-placeholder="Введите логин" placeholder="Введите логин">
            </div>
            
            <div class="form-group">
                <label for="password" data-i18n="Пароль">Пароль</label>
                <input type="password" name="password" id="password" required 
                       class="form-control" data-i18n-placeholder="Введите пароль" placeholder="Введите пароль">
            </div>
            
            <div class="form-options">
                <label class="checkbox">
                    <input type="checkbox" name="remember"> <span data-i18n="Запомнить меня">Запомнить меня</span>
                </label>
                <a href="#" class="forgot-password" data-i18n="Забыли пароль?">Забыли пароль?</a>
            </div>
            
            <button type="submit" class="btn-submit" data-i18n="Войти">Войти</button>
            
            <div class="auth-links">
                <p><span data-i18n="Нет аккаунта?">Нет аккаунта?</span> <a href="{% url 'register' %}" data-i18n="Зарегистрироваться">Зарегистрироваться</a></p>
            </div>
        </form>
        
        <div class="social-login">
            <p data-i18n="Или войдите через:">Или войдите через:</p>
            <div class="social-buttons">
                <button class="social-btn google" data-i18n="Google">Google</button>
                <button class="social-btn vk" data-i18n="VK">VK</button>
            </div>
        </div>
    </div>
</div>

<style>
.auth-page {
    min-height: calc(100vh - 200px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
}

.auth-container {
    max-width: 450px;
    width: 100%;
    background: white;
    border-radius: 30px;
    padding: 40px;
    box-shadow: var(--shadow);
}

.auth-header {
    text-align: center;
    margin-bottom: 30px;
}

.auth-header h1 {
    font-size: 2rem;
    margin-bottom: 10px;
}

.auth-form .form-group {
    margin-bottom: 20px;
}

.auth-form label {
    display: block;
    margin-bottom: 5px;
    font-weight: 500;
}

.form-control {
    width: 100%;
    padding: 15px;
    border: 2px solid var(--surface);
    border-radius: 10px;
    font-family: 'Montserrat', sans-serif;
    transition: all 0.3s ease;
}

.form-control:focus {
    border-color: var(--secondary);
    outline: none;
}

.form-options {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.checkbox {
    display: flex;
    align-items: center;
    gap: 5px;
    cursor: pointer;
}

.forgot-password {
    color: var(--secondary);
    text-decoration: none;
}

.btn-submit {
    width: 100%;
    padding: 15px;
    background: var(--gradient-1);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 1.1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
}

.btn-submit:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow);
}

.auth-links {
    text-align: center;
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
}

.auth-links a {
    color: var(--secondary);
    text-decoration: none;
    font-weight: 600;
}

.social-login {
    margin-top: 30px;
    text-align: center;
}

.social-login p {
    color: var(--gray);
    margin-bottom: 15px;
}

.social-buttons {
    display: flex;
    gap: 15px;
}

.social-btn {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
}

.social-btn.google {
    background: #db4437;
    color: white;
}

.social-btn.vk {
    background: #4a76a8;
    color: white;
}

.social-btn:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-light);
}
</style>
{% endblock %}
