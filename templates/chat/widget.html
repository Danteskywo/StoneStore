<div class="chat-widget" id="chatWidget">
    <div class="chat-button" onclick="toggleChat()">
        <span class="chat-icon">💬</span>
        <span class="chat-text" data-i18n="Чат">Чат</span>
        <span class="chat-badge" id="chatBadge" style="display: none;">1</span>
    </div>
    
    <div class="chat-window" id="chatWindow">
        <div class="chat-header">
            <h3 data-i18n="Чат с консультантом">Чат с консультантом</h3>
            <div class="chat-status" id="chatStatus">
                <span class="status-dot waiting"></span>
                <span class="status-text" data-i18n="Ожидание оператора">Ожидание оператора</span>
            </div>
            <button class="chat-close" onclick="toggleChat()">✕</button>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <div class="message system">
                <span data-i18n="Здравствуйте! Задайте свой вопрос, и оператор скоро ответит.">Здравствуйте! Задайте свой вопрос, и оператор скоро ответит.</span>
            </div>
        </div>
        
        <div class="chat-input-area">
            <textarea class="chat-input" id="chatInput" 
                      data-i18n-placeholder="Введите сообщение..." 
                      placeholder="Введите сообщение..." 
                      rows="1"></textarea>
            <button class="chat-send" onclick="sendMessage()">➤</button>
        </div>
    </div>
</div>

<style>
.chat-widget {
    position: fixed;
    bottom: 30px;
    right: 30px;
    z-index: 9999;
}

.chat-button {
    width: 60px;
    height: 60px;
    background: var(--gradient-1);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: all 0.3s ease;
    position: relative;
}

.chat-button:hover {
    transform: scale(1.1);
}

.chat-icon {
    font-size: 1.5rem;
    color: white;
}

.chat-text {
    display: none;
}

.chat-badge {
    position: absolute;
    top: -5px;
    right: -5px;
    background: var(--danger);
    color: white;
    border-radius: 50%;
    width: 20px;
    height: 20px;
    font-size: 0.8rem;
    display: flex;
    align-items: center;
    justify-content: center;
}

.chat-window {
    position: absolute;
    bottom: 80px;
    right: 0;
    width: 350px;
    height: 500px;
    background: white;
    border-radius: 20px;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    opacity: 0;
    visibility: hidden;
    transform: translateY(20px);
    transition: all 0.3s ease;
}

.chat-window.active {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
}

.chat-header {
    background: var(--gradient-1);
    color: white;
    padding: 15px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.chat-header h3 {
    font-size: 1rem;
    flex: 1;
}

.chat-status {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.8rem;
}

.status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
}

.status-dot.waiting { background: var(--warning); }
.status-dot.active { background: var(--success); }
.status-dot.offline { background: var(--danger); }

.chat-close {
    background: none;
    border: none;
    color: white;
    font-size: 1.2rem;
    cursor: pointer;
}

.chat-messages {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.message {
    max-width: 80%;
    padding: 10px 15px;
    border-radius: 15px;
    font-size: 0.9rem;
    word-wrap: break-word;
    animation: fadeIn 0.3s ease;
}

.message.user {
    background: var(--primary);
    color: white;
    align-self: flex-end;
    border-bottom-right-radius: 5px;
}

.message.operator {
    background: var(--surface);
    color: var(--dark);
    align-self: flex-start;
    border-bottom-left-radius: 5px;
}

.message.system {
    background: transparent;
    color: var(--gray);
    font-size: 0.8rem;
    text-align: center;
    align-self: center;
    max-width: 100%;
}

.message-time {
    font-size: 0.7rem;
    opacity: 0.7;
    margin-top: 5px;
    text-align: right;
}

.chat-input-area {
    padding: 15px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    background: white;
}

.chat-input {
    flex: 1;
    padding: 12px 15px;
    border: 2px solid var(--surface);
    border-radius: 25px;
    resize: none;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.95rem;
    transition: all 0.3s ease;
    max-height: 120px;
}

.chat-input:focus {
    outline: none;
    border-color: var(--secondary);
    box-shadow: 0 0 0 3px rgba(247, 37, 133, 0.1);
}

.chat-send {
    width: 45px;
    height: 45px;
    background: var(--gradient-2);
    color: white;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    align-self: flex-end;
}

.chat-send:hover {
    transform: scale(1.1) rotate(90deg);
    box-shadow: var(--shadow);
}

.chat-send:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@media (max-width: 768px) {
    .chat-window {
        width: 300px;
        height: 450px;
        right: 0;
        bottom: 70px;
    }
}
</style>

<script>
let chatVisible = false;
let lastMessageId = 0;
let checkInterval;
let isSending = false;
let messageIds = new Set(); // Для отслеживания уже добавленных сообщений

// Инициализация при загрузке страницы
document.addEventListener('DOMContentLoaded', function() {
    // Добавляем ID для системного сообщения
    const systemMsg = document.querySelector('.message.system');
    if (systemMsg) {
        systemMsg.id = 'msg-system';
    }
});

function toggleChat() {
    const window = document.getElementById('chatWindow');
    chatVisible = !chatVisible;
    
    if (chatVisible) {
        window.classList.add('active');
        // Сбрасываем lastMessageId при открытии, чтобы загрузить все сообщения
        lastMessageId = 0;
        messageIds.clear(); // Очищаем Set сообщений
        loadMessages();
        checkInterval = setInterval(loadMessages, 3000);
        checkOperator();
        
        // Прокручиваем вниз
        setTimeout(() => {
            const container = document.getElementById('chatMessages');
            container.scrollTop = container.scrollHeight;
        }, 100);
    } else {
        window.classList.remove('active');
        clearInterval(checkInterval);
    }
}

function sendMessage() {
    // Защита от множественной отправки
    if (isSending) return;
    
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    
    if (!text) return;
    
    // Блокируем кнопку отправки
    isSending = true;
    const sendButton = document.querySelector('.chat-send');
    sendButton.disabled = true;
    
    fetch('/chat/send/', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': '{{ csrf_token }}'
        },
        body: JSON.stringify({ message: text })
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            addMessage(data.message);
            input.value = '';
            input.style.height = 'auto';
            // Обновляем lastMessageId
            lastMessageId = data.message.id;
        } else {
            console.error('Ошибка отправки:', data.error);
            alert('Не удалось отправить сообщение. Попробуйте еще раз.');
        }
    })
    .catch(error => {
        console.error('Ошибка соединения:', error);
        alert('Ошибка соединения. Проверьте подключение к интернету.');
    })
    .finally(() => {
        // Разблокируем кнопку отправки
        isSending = false;
        sendButton.disabled = false;
    });
}

function loadMessages() {
    fetch(`/chat/messages/?last_id=${lastMessageId}`)
        .then(response => response.json())
        .then(data => {
            if (data.success && data.messages && data.messages.length > 0) {
                // Фильтруем только новые сообщения
                const newMessages = data.messages.filter(msg => !messageIds.has(msg.id));
                
                newMessages.forEach(msg => {
                    addMessage(msg);
                    messageIds.add(msg.id);
                });
                
                // Обновляем lastMessageId на ID последнего сообщения
                if (data.messages.length > 0) {
                    lastMessageId = data.messages[data.messages.length - 1].id;
                }
            }
        })
        .catch(error => console.error('Ошибка загрузки сообщений:', error));
}

function addMessage(message) {
    const container = document.getElementById('chatMessages');
    
    // Проверяем, есть ли уже такое сообщение
    if (document.getElementById(`msg-${message.id}`)) {
        return;
    }
    
    const msgDiv = document.createElement('div');
    msgDiv.id = `msg-${message.id}`;
    msgDiv.className = `message ${message.is_operator ? 'operator' : 'user'}`;
    msgDiv.innerHTML = `
        ${message.text}
        <div class="message-time">${message.time}</div>
    `;
    
    container.appendChild(msgDiv);
    container.scrollTop = container.scrollHeight;
}

function checkOperator() {
    fetch('/chat/check-operator/')
        .then(response => response.json())
        .then(data => {
            const statusDot = document.querySelector('.status-dot');
            const statusText = document.querySelector('.status-text');
            
            if (data.has_operator) {
                statusDot.className = 'status-dot active';
                statusText.textContent = `${data.operator_name} ${window.translate ? window.translate('онлайн') : 'онлайн'}`;
            } else {
                statusDot.className = 'status-dot waiting';
                statusText.textContent = window.translate ? window.translate('Ожидание оператора') : 'Ожидание оператора';
            }
        })
        .catch(error => console.error('Ошибка проверки оператора:', error));
}

// Обработка ввода текста
const chatInput = document.getElementById('chatInput');
if (chatInput) {
    chatInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });

    chatInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });
}

// Очищаем интервал при закрытии страницы
window.addEventListener('beforeunload', function() {
    if (checkInterval) {
        clearInterval(checkInterval);
    }
});

// Функция для перевода (если не определена глобально)
window.translate = window.translate || function(text) { return text; };
</script>
